services:
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-master-data:/data

  redis-replica-1:
    image: redis:7-alpine
    container_name: redis-replica-1
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --appendfsync everysec --replicaof redis-master 6379
    depends_on:
      - redis-master
    volumes:
      - redis-replica1-data:/data

  redis-replica-2:
    image: redis:7-alpine
    container_name: redis-replica-2
    ports:
      - "6381:6379"
    command: redis-server --appendonly yes --appendfsync everysec --replicaof redis-master 6379
    depends_on:
      - redis-master
    volumes:
      - redis-replica2-data:/data

  sentinel-1:
    image: redis:7-alpine
    container_name: sentinel-1
    ports:
      - "26379:26379"
    volumes:
      - ./sentinel/sentinel.conf:/etc/redis/sentinel.conf:ro
    entrypoint: >
      sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2

  sentinel-2:
    image: redis:7-alpine
    container_name: sentinel-2
    ports:
      - "26380:26379"
    volumes:
      - ./sentinel/sentinel.conf:/etc/redis/sentinel.conf:ro
    entrypoint: >
      sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2

  sentinel-3:
    image: redis:7-alpine
    container_name: sentinel-3
    ports:
      - "26381:26379"
    volumes:
      - ./sentinel/sentinel.conf:/etc/redis/sentinel.conf:ro
    entrypoint: >
      sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
      - sentinel-1
      - sentinel-2
      - sentinel-3
    environment:
      SPRING_DATA_REDIS_SENTINEL_MASTER: mymaster
      SPRING_DATA_REDIS_SENTINEL_NODES: sentinel-1:26379,sentinel-2:26379,sentinel-3:26379
      REDIS_NODES: redis-master,redis-replica-1,redis-replica-2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  redis-master-data:
  redis-replica1-data:
  redis-replica2-data:
